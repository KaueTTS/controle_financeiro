name: CI

on:
  push:
    branches: [ "main", "qa" ]
  pull_request:
    branches: [ "main", "qa" ]

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup do Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cache de dependências Go
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('server/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Baixar dependências
        run: go mod download

      - name: Verificar formatação
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Código não formatado corretamente"
            gofmt -l .
            exit 1
          fi

      - name: Rodar testes
        run: go test ./... -v

      - name: Build da aplicação
        run: go build -o finance-api .

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup do Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Build do frontend
        run: npm run build