name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup do Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'

      - name: Cache de dependências
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Baixar dependências
        run: go mod download

      - name: Verificar formatação (gofmt)
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Código não formatado corretamente"
            gofmt -l .
            exit 1
          fi

      - name: Rodar testes
        run: go test ./... -v

      - name: Build da aplicação
        run: go build -o app .